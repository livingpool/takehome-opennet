spring:
  application:
    name: demo

# define mysql properties here
  datasource:
    url: jdbc:mysql://localhost:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: taskuser
    password: taskpass
    driver-class-name: com.mysql.cj.jdbc.Driver

# define redis properties here
  data:
    redis:
      host: localhost
      port: 6379

# define rocketmq properties here
rocketmq:
  enabled: false
  name-server: localhost:9876
  producer-group: rate-limit-producer-group
  topic: rate-limit-events
  send-timeout-ms: 3000

rate-limit:
  redis:
    config-key-prefix: "rate_limit:config:"
    usage-key-prefix: "rate_limit:usage:"
    config-ttl: 10m
  paging:
    default-page: 0
    default-size: 20
    max-size: 100
